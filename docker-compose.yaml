version: '3.8'

services:
  db:
    image: postgres:17.5
    container_name: postgres_db
    restart: always
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 6758
      POSTGRES_DB: know_how_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - general-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: know_how:latest
    container_name: server
    restart: always
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/know_how_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: 6758
    networks:
      - general-network

networks:
  general-network:
    driver: bridge

volumes:
  postgres_data:
spring:
  application:
    name: KnowHow
  datasource:
    url: jdbc:postgresql://localhost:5436/know_how_db
    username: user
    password: 6758
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: false
    baseline-version: 1
    baseline-on-migrate: true
    loggers: slf4j
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate
        transaction:
          jta:
            platform: none
    database: postgresql


server:
  port: 8080

logging:
  level:
    root: info
  pattern:
    console: '%d{dd.MM.yyyy HH:mm:ss.SSS} [%thread] %clr(%-5level) %logger{36} - %msg%n'
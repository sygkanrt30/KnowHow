spring:
  application:
    name: KnowHow
    rest:
      api:
        prefix: /api
  datasource:
    url: jdbc:postgresql://localhost:5436/know_how_db
    username: user
    password: 6758
    driver-class-name: org.postgresql.Driver
  flyway:
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: false
    baseline-version: 1
    baseline-on-migrate: true
    loggers: slf4j
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate
        transaction:
          jta:
            platform: none
    database: postgresql


server:
  port: 8080
  base-url:
    auth: /api/v1/auth
    profile: api/v1/profile
    user: api/v1/user
    course: api/v1/courses
    balance: api/v1/balance


csrf:
  token:
    header-name: X-CSRF-TOKEN

jwt:
  cookie-token-key: '{"kty":"oct","k":"956PBFst1FguLr5irJD-aQ"}'

moderator:
  code: 'Sqwe414jmgjdgsrf32!.o;o24f'

coins:
